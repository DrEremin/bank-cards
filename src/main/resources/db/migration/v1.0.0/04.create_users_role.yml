databaseChangeLog:
  - changeSet:
      id: "04.create_users_role.yml"
      author: "Ivan Eremin"
      changes:
        - createTable:
            tableName: users_role
            remarks: "Отношение для связи M:N app_user и role"
            columns:
              - column:
                  name: user_id
                  type: UUID
                  remarks: "Идентификатор пользователя"
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: UUID
                  remarks: "Идентификатор роли"
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: users_role
            columnNames: user_id, role_id
            constraintName: users_role_pkey