databaseChangeLog:
  - changeSet:
      id: "01.create_card.yml"
      author: "Ivan Eremin"
      changes:
        - createTable:
            tableName: card
            remarks: "Данные банковской карты"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: encoded_number
                  type: varchar
                  remarks: "Зашифрованный номер карты"
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: timestamp
                  remarks: "Время окончания срока действия карты"
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar
                  remarks: "Статус активности карты"
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: numeric(20, 2)
                  remarks: "Баланс карты"
                  defaultValue: "0.00"
              - column:
                  name: create_time
                  type: timestamp
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  remarks: "Пользователь, который создал запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  remarks: "Время последнего изменения"
              - column:
                  name: last_update_user
                  type: varchar
                  remarks: "Пользователь, внесший последние изменения"
              - column:
                  name: deleted
                  type: boolean
                  remarks: "Признак удаления записи"
                  defaultValue: "false"
                  constraints:
                    nullable: false
