databaseChangeLog:
  - changeSet:
      id: "06.create_transfer.yml"
      author: "Ivan Eremin"
      changes:
        - createTable:
            tableName: transfer
            remarks: "Данные перевода между картами"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: source_card_id
                  type: UUID
                  remarks: "Идентификатор карты-источника"
                  constraints:
                    nullable: false
              - column:
                  name: target_card_id
                  type: UUID
                  remarks: "Идентификатор карты назначения"
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: numeric(20, 2)
                  remarks: "Сумма перевода"
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: timestamp
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  remarks: "Пользователь, который создал запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  remarks: "Время последнего изменения"
              - column:
                  name: last_update_user
                  type: varchar
                  remarks: "Пользователь, внесший последние изменения"
              - column:
                  name: deleted
                  type: boolean
                  remarks: "Признак удаления записи"
                  defaultValue: "false"
                  constraints:
                    nullable: false