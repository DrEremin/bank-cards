databaseChangeLog:
  - changeSet:
      id: "02.create_users.yml"
      author: "Ivan Eremin"
      changes:
        - createTable:
            tableName: users
            remarks: "Данные пользователя"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: user_name
                  type: varchar
                  remarks: "Ник пользователя"
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: encoded_password
                  type: varchar
                  remarks: "Зашифрованный пароль пользователя"
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: timestamp
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  remarks: "Пользователь, который создал запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  remarks: "Время последнего изменения"
              - column:
                  name: last_update_user
                  type: varchar
                  remarks: "Пользователь, внесший последние изменения"