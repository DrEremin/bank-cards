databaseChangeLog:
  - changeSet:
      id: "03.create_role.yml"
      author: "Ivan Eremin"
      changes:
        - createTable:
            tableName: role
            remarks: "Роль пользователя"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: role_name
                  type: varchar
                  remarks: "Имя роли"
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: create_time
                  type: timestamp
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  remarks: "Пользователь, который создал запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  remarks: "Время последнего изменения"
              - column:
                  name: last_update_user
                  type: varchar
                  remarks: "Пользователь, внесший последние изменения"